<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Smart Tech Zone</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08090c;--surface:#0f1117;--surface2:#181c27;
  --border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.14);
  --text:#eef0f5;--muted:#6b7080;--sub:#9aa0b0;
  --blue:#4f8ef7;--blue-d:#2563eb;--green:#3ecf8e;--green-dim:rgba(62,207,142,0.12);
  --r:12px;--r-lg:16px;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.page{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 0 80px}
header{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:50;background:rgba(8,9,12,0.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:28px;height:28px;border-radius:7px;background:var(--blue);display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:14px;height:14px;fill:#08090c}
.logo-name{font-size:14px;font-weight:700;letter-spacing:-0.2px}
.logo-name em{color:var(--blue);font-style:normal}
.hdr-pill{font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:3px 10px;border-radius:20px}
.hero{padding:52px 20px 40px;text-align:center;border-bottom:1px solid var(--border)}
.hero-eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--blue);border:1px solid rgba(79,142,247,0.25);background:rgba(79,142,247,0.07);padding:5px 12px;border-radius:20px;margin-bottom:20px}
.hero-eyebrow::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--blue);display:block}
.hero h1{font-size:36px;font-weight:800;letter-spacing:-1.2px;line-height:1.08;margin-bottom:12px}
.hero h1 .accent{color:var(--blue)}
.hero-sub{font-size:14px;color:var(--sub);line-height:1.65;max-width:300px;margin:0 auto}
.trust-bar{display:flex;justify-content:center;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--surface)}
.trust-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:14px 8px;border-right:1px solid var(--border);font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px}
.trust-item:last-child{border-right:none}
.trust-item svg{width:16px;height:16px;stroke:var(--blue);stroke-width:1.8;fill:none;margin-bottom:2px}
.products{padding:28px 16px 0}
.sec-label{font-size:10px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--muted);margin-bottom:18px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:20px;transition:border-color 0.2s,transform 0.2s}
.card:hover{border-color:var(--border-h)}
.card:active{transform:scale(0.995)}
.card-img{position:relative;width:100%;aspect-ratio:16/9.5;background:var(--surface2);overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.5s ease}
.card:hover .card-img img{transform:scale(1.04)}
.badge-brand{position:absolute;top:12px;left:12px;background:rgba(8,9,12,0.78);border:1px solid var(--border-h);backdrop-filter:blur(8px);color:var(--blue);font-size:9px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;padding:4px 9px;border-radius:6px}
.badge-off{position:absolute;top:12px;right:12px;background:var(--green);color:#08090c;font-size:11px;font-weight:800;padding:4px 9px;border-radius:6px}
.card-body{padding:18px}
.card-cat{font-size:10px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.card-title{font-size:18px;font-weight:700;line-height:1.28;margin-bottom:13px;letter-spacing:-0.3px}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.pill{background:var(--surface2);border:1px solid var(--border);color:var(--sub);font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px}
.price-row{display:flex;align-items:baseline;gap:9px;margin-bottom:18px}
.price-now{font-size:24px;font-weight:800;color:var(--text)}
.price-was{font-size:14px;color:var(--muted);text-decoration:line-through}
.price-save{font-size:11px;font-weight:700;color:var(--green);background:var(--green-dim);padding:2px 8px;border-radius:20px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--blue);color:#08090c;border:none;padding:15px;border-radius:10px;font-size:14px;font-weight:800;text-decoration:none;cursor:pointer;transition:background 0.15s,transform 0.1s;letter-spacing:0.1px}
.btn:hover{background:var(--blue-d)}
.btn:active{transform:scale(0.98)}
.btn svg{width:15px;height:15px;stroke:currentColor;stroke-width:2.5;fill:none;flex-shrink:0}
.card-trust{display:flex;gap:8px;margin-top:12px}
.ct{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 6px;text-align:center;font-size:10px;font-weight:600;color:var(--muted);line-height:1.5}
footer{text-align:center;padding:24px 20px 36px;font-size:12px;color:var(--muted);border-top:1px solid var(--border)}
footer strong{color:var(--sub)}
.footer-dots{display:flex;justify-content:center;gap:4px;margin-bottom:12px}
.footer-dots span{width:4px;height:4px;border-radius:50%;background:var(--border-h)}
.footer-dots span:nth-child(2){background:var(--blue)}
</style>
</head>
<body>

<div class="page">
<header>
  <div class="logo">
    <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>

<div class="hero">

<script>
const FALLBACK='https://placehold.co/640x400/181c27/6b7080?text=Product';
const KEY='smarttechzone_products';
const DEFAULTS = [
  {

    ],

    ]

function esc(s){const d=document.createElement('div');d.textContent=s??'';return d.innerHTML}
function buildCard(p){
  const pills=(p.features||[]).map(f=>`<span class="pill">${esc(f)}</span>`).join('');
  const trust=(p.trust||[['🚚','Fast delivery'],['💵','COD available'],['🔄','Easy returns']]).map(t=>`<div class="ct">${t[0]}<br>${esc(t[1])}</div>`).join('');
  return`<div class="card"><div class="card-img"><img src="${esc(p.img||FALLBACK)}" alt="${esc(p.title)}" loading="lazy" onerror="this.src='${FALLBACK}'">${p.brand?`<div class="badge-brand">${esc(p.brand)}</div>`:''} ${p.discount?`<div class="badge-off">${esc(p.discount)}</div>`:''}</div><div class="card-body">${p.category?`<div class="card-cat">${esc(p.category)}</div>`:''}<div class="card-title">${esc(p.title)}</div>${pills?`<div class="pills">${pills}</div>`:''}<div class="price-row">${p.price?`<span class="price-now">${esc(p.price)}</span>`:''}${p.mrp?`<span class="price-was">${esc(p.mrp)}</span>`:''}${p.save?`<span class="price-save">${esc(p.save)}</span>`:''}</div><a class="btn" href="${esc(p.link)}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>Buy now · Order today</a><div class="card-trust">${trust}</div></div></div>`;
}
async function load(){
  let list=DEFAULTS;
  try{const r=await window.storage.get(KEY,true);if(r)list=JSON.parse(r.value)}catch(_){}
  document.getElementById('grid').innerHTML=list.map(buildCard).join('');
  document.getElementById('countPill').textContent=`${list.length} Product${list.length===1?'':'s'}`;
}
load();setInterval(load,5000);

<script>
(function(){
  const cv=document.getElementById('bg');
  const ctx=cv.getContext('2d');
  let W,H,mx=0,my=0,t=0;

  /* ── LAYER 1: Aurora blobs ── */
  const blobs=[
    {x:0.15,y:0.18,r:0.38,hue:210,speed:0.0007,phase:0},
    {x:0.78,y:0.12,r:0.32,hue:260,speed:0.0009,phase:2.1},
    {x:0.55,y:0.72,r:0.42,hue:190,speed:0.0006,phase:4.3},
    {x:0.9,y:0.6,r:0.28,hue:230,speed:0.001,phase:1.0},
  ];

  /* ── LAYER 2: Floating orbs ── */
  const N_ORBS=18;
  let orbs=[];

  /* ── LAYER 3: Star field ── */
  const N_STARS=90;
  let stars=[];

  /* ── LAYER 4: Shooting stars ── */
  let shots=[];
  let nextShot=0;

  function resize(){
    W=cv.width=window.innerWidth;
    H=cv.height=window.innerHeight;
    orbs=Array.from({length:N_ORBS},(_,i)=>({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*0.5,vy:(Math.random()-.5)*0.5,
      r:3+Math.random()*5,
      hue:180+Math.random()*100,
      phase:Math.random()*Math.PI*2,
      speed:0.004+Math.random()*0.006
    }));
    stars=Array.from({length:N_STARS},()=>({
      x:Math.random()*W,y:Math.random()*H,
      r:0.4+Math.random()*1.0,
      phase:Math.random()*Math.PI*2,
      speed:0.008+Math.random()*0.016
    }));
  }

  resize();
  window.addEventListener('resize',resize);
  window.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});

  function spawnShot(){
    const fromTop=Math.random()<0.6;
    shots.push({
      x: fromTop ? Math.random()*W : (Math.random()<0.5?0:W),
      y: fromTop ? -10 : Math.random()*H*0.5,
      vx: fromTop ? (Math.random()-.5)*3+1 : (Math.random()<0.5?2:-2),
      vy: fromTop ? 2+Math.random()*3 : (Math.random()-.5)*2+1,
      len: 80+Math.random()*120,
      life:1, decay:0.012+Math.random()*0.01,
      hue:200+Math.random()*60
    });
  }

  function drawFrame(){
    t+=0.012;
    ctx.clearRect(0,0,W,H);

    /* ── Aurora blobs ── */
    for(const b of blobs){
      const bx=(b.x+Math.sin(t*b.speed*80+b.phase)*0.08)*W;
      const by=(b.y+Math.cos(t*b.speed*60+b.phase)*0.07)*H;
      const br=b.r*Math.min(W,H);
      const g=ctx.createRadialGradient(bx,by,0,bx,by,br);
      g.addColorStop(0,`hsla(${b.hue},90%,55%,0.13)`);
      g.addColorStop(0.5,`hsla(${b.hue+20},80%,50%,0.06)`);
      g.addColorStop(1,`hsla(${b.hue},70%,40%,0)`);
      ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);
      ctx.fillStyle=g;ctx.fill();
    }

    /* ── Star field ── */
    for(const s of stars){
      const pulse=0.35+Math.sin(t*s.speed*5+s.phase)*0.35+
                  (Math.hypot(s.x-mx,s.y-my)<180?0.3*(1-Math.hypot(s.x-mx,s.y-my)/180):0);
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,210,255,${Math.max(0,Math.min(1,pulse))})`;
      ctx.fill();
    }

    /* ── Floating orbs ── */
    for(const o of orbs){
      o.x+=o.vx;o.y+=o.vy;
      if(o.x<-20||o.x>W+20)o.vx*=-1;
      if(o.y<-20||o.y>H+20)o.vy*=-1;
      const glow=Math.sin(t*o.speed*5+o.phase)*0.5+0.5;
      const md=Math.hypot(o.x-mx,o.y-my);
      const boost=md<140?0.4*(1-md/140):0;
      const alpha=0.25+glow*0.35+boost;
      const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r*(2.5+glow));
      g.addColorStop(0,`hsla(${o.hue},100%,70%,${alpha})`);
      g.addColorStop(1,`hsla(${o.hue},90%,50%,0)`);
      ctx.beginPath();ctx.arc(o.x,o.y,o.r*(2.5+glow),0,Math.PI*2);
      ctx.fillStyle=g;ctx.fill();
    }

    /* ── Shooting stars ── */
    if(t>nextShot){spawnShot();nextShot=t+2+Math.random()*4}
    shots=shots.filter(s=>s.life>0);
    for(const s of shots){
      const tx=s.x-s.vx*(s.len/Math.hypot(s.vx,s.vy));
      const ty=s.y-s.vy*(s.len/Math.hypot(s.vx,s.vy));
      const g=ctx.createLinearGradient(tx,ty,s.x,s.y);
      g.addColorStop(0,`hsla(${s.hue},100%,80%,0)`);
      g.addColorStop(1,`hsla(${s.hue},100%,90%,${s.life*0.9})`);
      ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(s.x,s.y);
      ctx.strokeStyle=g;ctx.lineWidth=1.5;ctx.stroke();
      /* head glow */
      const hg=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,6);
      hg.addColorStop(0,`hsla(${s.hue},100%,95%,${s.life*0.8})`);
      hg.addColorStop(1,`hsla(${s.hue},100%,70%,0)`);
      ctx.beginPath();ctx.arc(s.x,s.y,6,0,Math.PI*2);
      ctx.fillStyle=hg;ctx.fill();
      s.x+=s.vx;s.y+=s.vy;
      s.life-=s.decay;
    }

    /* ── Mouse ripple ── */
    if(mx>0){
      const mr=ctx.createRadialGradient(mx,my,0,mx,my,180);
      mr.addColorStop(0,`rgba(79,142,247,0.06)`);
      mr.addColorStop(1,`rgba(79,142,247,0)`);
      ctx.beginPath();ctx.arc(mx,my,180,0,Math.PI*2);
      ctx.fillStyle=mr;ctx.fill();
    }

    requestAnimationFrame(drawFrame);
  }
  drawFrame();
})();
</script>
</body>
